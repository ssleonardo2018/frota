<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal - Gestão de Frota</title>
    <script src="https://jsdelivr.net"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #2c3e50;
            margin: 15px 0 25px 0;
            font-size: 1.6rem;
            text-align: center;
        }
        
        /* CONTAINER DOS PAINÉIS (DASHBOARD) */
        .dashboard {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .painel {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 6px solid #2c3e50;
        }
        .painel-2 {
            border-left-color: #28a745;
        }
        .painel-titulo {
            font-size: 0.85rem;
            font-weight: bold;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .painel-mes {
            color: #34495e;
            font-weight: normal;
        }
        .painel-valor {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .painel-subtexto {
            font-size: 0.9rem;
            color: #555;
        }

        /* CONTAINER DOS BOTÕES DO MENU */
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-menu {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            transition: background 0.2s;
            text-align: center;
        }
        .btn-menu:active {
            transform: scale(0.99);
        }
        .btn-km {
            background: #2c3e50;
        }
        .btn-km:hover { background: #1a252f; }
        .btn-abastecimento {
            background: #28a745;
        }
        .btn-abastecimento:hover { background: #218838; }
        .icon {
            margin-right: 8px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <h1>Gestão de Frota</h1>

    <!-- SEÇÃO DOS PAINÉIS -->
    <div class="dashboard">
        <!-- Painel 1: KM Percorrido -->
        <div class="painel">
            <div class="painel-titulo">KM Percorrido <span class="painel-mes" id="mesPainel1">(-/----)</span></div>
            <div class="painel-valor" id="valKmTotal">0 KM</div>
        </div>
        
        <!-- Painel 2: Abastecimento -->
        <div class="painel painel-2">
            <div class="painel-titulo">Combustível Mês <span class="painel-mes" id="mesPainel2">(-/----)</span></div>
            <div class="painel-valor" id="valLitrosTotal">0.00 L</div>
            <div class="painel-subtexto" id="valQtdAbastecimento">Abastecimentos: 0 vezes</div>
        </div>
    </div>

    <!-- SEÇÃO DOS BOTÕES -->
    <div class="menu-container">
        <a href="frontend/menu.html" class="btn-menu btn-km">
            <span class="icon">🚗</span> Entrar
        </a>
        
    </div>

    <script>
        // Função executada ao carregar a página
        async function carregarDashboard() {
            // 1. Descobrir o mês e ano atual do sistema
            const hoje = new Date();
            const anoAtual = hoje.getFullYear();
            const mesAtualNum = hoje.getMonth() + 1; // 1 a 12
            const mesFormatado = String(mesAtualNum).padStart(2, '0'); // "01", "02"...
            
            const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const nomeMesAtual = nomesMeses[hoje.getMonth()];

            // Atualiza os títulos dos painéis com o mês corrente
            document.getElementById('mesPainel1').innerText = `(${nomeMesAtual} / ${anoAtual})`;
            document.getElementById('mesPainel2').innerText = `(${nomeMesAtual} / ${anoAtual})`;

            // Chave de comparação para bater com o formato "YYYY-MM" salvo no banco
            const chaveMesAno = `${anoAtual}-${mesFormatado}`;

            try {
                // 2. BUSCAR DADOS DE KM
                const resKm = await fetch('http://localhost:3000/km');
                if (resKm.ok) {
                    const registrosKm = await resKm.json();
                    
                    // Filtra apenas registros que começam com o ano e mês atual (ex: "2026-07-15" começa com "2026-07")
                    const registrosDoMes = registrosKm.filter(reg => reg.data && reg.data.startsWith(chaveMesAno));
                    
                    // Soma todos os KMs totais do mês corrente
                    const totalKm = registrosDoMes.reduce((soma, reg) => soma + (parseFloat(reg.km_total) || 0), 0);
                    document.getElementById('valKmTotal').innerText = `${totalKm.toLocaleString('pt-BR')} KM`;
                }

                // 3. BUSCAR DADOS DE ABASTECIMENTO
                const resAbast = await fetch('http://localhost:3000/abastecimento');
                if (resAbast.ok) {
                    const registrosAbast = await resAbast.json();
                    
                    // Filtra os abastecimentos ocorridos no mês atual
                    const abastecimentosDoMes = registrosAbast.filter(reg => reg.data && reg.data.startsWith(chaveMesAno));
                    
                    // Soma Diesel + ARLA para compor a quantidade total de litros abastecidos
                    const totalLitros = abastecimentosDoMes.reduce((soma, reg) => {
                        const diesel = parseFloat(reg.litros_diesel) || 0;
                        const arla = parseFloat(reg.litros_arla) || 0;
                        return soma + diesel + arla;
                    }, 0);

                    // Atualiza os elementos visíveis do Painel 2
                    document.getElementById('valLitrosTotal').innerText = `${totalLitros.toFixed(2).replace('.', ',')} L`;
                    document.getElementById('valQtdAbastecimento').innerText = `Abastecimentos: ${abastecimentosDoMes.length} vezes`;
                }

            } catch (erro) {
                console.error("Erro ao carregar os dados dos painéis:", erro);
            }
        }

        // Inicializa a consulta automática
        document.addEventListener('DOMContentLoaded', carregarDashboard);
    </script>
</body>
</html>
