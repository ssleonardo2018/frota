<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KM Diário</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
  📋 KM Diário
  <div id="saudacaoMotorista" style="font-size:0.8rem; font-weight:400; margin-top:4px;"></div>
</header>

<main>
  <div id="mensagem" class="mensagem"></div>

  <form class="formulario" id="formKm">
    <input type="hidden" id="registroId">

    <div class="linha-dupla">
      <div class="campo">
        <label for="data">Data</label>
        <input type="date" id="data" required>
      </div>
      <div class="campo">
        <label for="placa">Placa</label>
        <input type="text" id="placa" placeholder="ABC1D23" maxlength="8" required style="text-transform:uppercase">
      </div>
    </div>

    <div class="linha-dupla">
      <div class="campo">
        <label for="kmInicio">KM Início</label>
        <input type="number" id="kmInicio" step="0.1" min="0" required>
      </div>
      <div class="campo">
        <label for="kmFinal">KM Final</label>
        <input type="number" id="kmFinal" step="0.1" min="0" required>
      </div>
    </div>

    <div class="campo">
      <label for="kmTotal">KM Total (calculado automaticamente)</label>
      <input type="text" id="kmTotal" readonly value="0">
    </div>

    <div class="campo">
      <label for="rota">Rota</label>
      <input type="text" id="rota" placeholder="Ex: Origem - Destino">
    </div>

    <div class="campo">
      <label for="observacoes">Observações</label>
      <textarea id="observacoes" rows="3" placeholder="Observações (opcional)"></textarea>
    </div>

    <div class="acoes-form">
      <button type="submit" class="btn btn-sucesso" id="btnSalvar">💾 Salvar</button>
      <button type="button" class="btn btn-secundario" id="btnImprimir">🖨️ Imprimir</button>
      <a href="menu.html" class="btn btn-neutro">🏠 Menu</a>
    </div>
  </form>

  <div class="lista-titulo">Registros do mês atual</div>
  <div id="listaRegistros">
    <div class="carregando">Carregando registros...</div>
  </div>

  <!-- Esta div só aparece na impressão devido ao CSS acima -->
<div id="area-impressao">
    
    <!-- Cabeçalho solicitado -->
    <div class="print-header">
        <h2>Relatório de KM Diário</h2>
        <div class="print-header-grid">
            <div class="print-header-item">Motorista: <span id="print-motorista">Nome do Motorista</span></div>
            <div class="print-header-item">Turno: <span id="print-turno">Diurno/Noturno</span></div>
            <div class="print-header-item print-month-year">Mês/Ano: <span id="print-periodo">07/2026</span></div>
        </div>
    </div>

    <!-- Tabela com bordas -->
    <table class="print-table">
        <thead>
            <tr>
                <th class="col-data">Data</th>
                <th class="col-km-ini">KM Início</th>
                <th class="col-km-fim">KM Final</th>
                <th class="col-km-tot">KM Total</th>
                <th class="col-placa">Placa</th>
                <th class="col-rota">Rota</th>
                <th class="col-obs">Observações</th>
            </tr>
        </thead>
        <tbody id="print-table-body">
            <!-- Os dias do mês serão gerados via JavaScript aqui dentro -->
        </tbody>
    </table>
</div>


</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const cliente = exigirConfiguracaoSupabase();
const motorista = cliente ? exigirLogin() : null;
if (motorista) {
  document.getElementById('saudacaoMotorista').textContent = `Motorista: ${motorista.nome}`;
}

const form = document.getElementById('formKm');
const campoData = document.getElementById('data');
const campoPlaca = document.getElementById('placa');
const campoKmInicio = document.getElementById('kmInicio');
const campoKmFinal = document.getElementById('kmFinal');
const campoKmTotal = document.getElementById('kmTotal');
const campoRota = document.getElementById('rota');
const campoObs = document.getElementById('observacoes');
const campoId = document.getElementById('registroId');
const btnSalvar = document.getElementById('btnSalvar');

// Data de hoje como padrão
campoData.value = new Date().toISOString().slice(0, 10);

function calcularKmTotal() {
  const ini = parseFloat(campoKmInicio.value) || 0;
  const fim = parseFloat(campoKmFinal.value) || 0;
  const total = fim - ini;
  campoKmTotal.value = total > 0 ? total.toFixed(1) : '0';
}
campoKmInicio.addEventListener('input', calcularKmTotal);
campoKmFinal.addEventListener('input', calcularKmTotal);

function mostrarMensagem(texto, tipo) {
  const el = document.getElementById('mensagem');
  el.textContent = texto;
  el.className = `mensagem ${tipo}`;
  setTimeout(() => { el.className = 'mensagem'; }, 4000);
}

function limparFormulario() {
  form.reset();
  campoId.value = '';
  campoData.value = new Date().toISOString().slice(0, 10);
  campoKmTotal.value = '0';
  btnSalvar.textContent = '💾 Salvar';
}

async function salvarRegistro(evento) {
  evento.preventDefault();
  if (!cliente || !motorista) return;

  const kmInicio = parseFloat(campoKmInicio.value);
  const kmFinal = parseFloat(campoKmFinal.value);

  if (kmFinal < kmInicio) {
    mostrarMensagem('O KM final não pode ser menor que o KM início.', 'erro');
    return;
  }

  const registro = {
    data: campoData.value,
    km_inicio: kmInicio,
    km_final: kmFinal,
    km_total: kmFinal - kmInicio,
    placa: campoPlaca.value.toUpperCase().trim(),
    rota: campoRota.value.trim(),
    observacoes: campoObs.value.trim(),
    motorista_id: motorista.id
  };

  btnSalvar.disabled = true;
  try {
    let resultado;
    if (campoId.value) {
      resultado = await cliente.from('kmdiario').update(registro).eq('id', campoId.value);
    } else {
      resultado = await cliente.from('kmdiario').insert([registro]);
    }
    if (resultado.error) throw resultado.error;

    mostrarMensagem('Registro salvo com sucesso!', 'sucesso');
    limparFormulario();
    carregarLista();
  } catch (e) {
    console.error(e);
    mostrarMensagem('Erro ao salvar: ' + e.message, 'erro');
  } finally {
    btnSalvar.disabled = false;
  }
}

async function carregarLista() {
  if (!cliente || !motorista) return;
  const inicio = primeiroDiaMesAtual();
  const fim = ultimoDiaMesAtual();
  const container = document.getElementById('listaRegistros');
  container.innerHTML = '<div class="carregando">Carregando registros...</div>';

  try {
    const { data, error } = await cliente
      .from('kmdiario')
      .select('*')
      .eq('motorista_id', motorista.id)
      .gte('data', inicio)
      .lte('data', fim)
      .order('data', { ascending: false });

    if (error) throw error;

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="vazio">Nenhum registro neste mês ainda.</div>';
      return;
    }

    container.innerHTML = data.map(r => `
      <div class="lista-registro">
        <div class="linha-campo"><span class="rotulo-campo">Data</span><span>${formatarDataBR(r.data)}</span></div>
        <div class="linha-campo"><span class="rotulo-campo">KM Total</span><span>${formatarNumero(r.km_total, 1)} km</span></div>
        <div class="linha-campo"><span class="rotulo-campo">Placa</span><span>${r.placa || '-'}</span></div>
        <div class="linha-campo"><span class="rotulo-campo">Rota</span><span>${r.rota || '-'}</span></div>
        <div class="linha-campo"><span class="rotulo-campo">Observações</span><span>${r.observacoes || '-'}</span></div>
        <div class="acoes-registro">
          <button class="btn-editar" onclick="editarRegistro('${r.id}')">✏️ Editar</button>
          <button class="btn-excluir" onclick="excluirRegistro('${r.id}')">🗑️ Excluir</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="vazio">Erro ao carregar registros.</div>';
  }
}

async function editarRegistro(id) {
  if (!cliente) return;
  try {
    const { data, error } = await cliente.from('kmdiario').select('*').eq('id', id).single();
    if (error) throw error;

    campoId.value = data.id;
    campoData.value = data.data;
    campoPlaca.value = data.placa;
    campoKmInicio.value = data.km_inicio;
    campoKmFinal.value = data.km_final;
    campoKmTotal.value = data.km_total;
    campoRota.value = data.rota || '';
    campoObs.value = data.observacoes || '';
    btnSalvar.textContent = '💾 Atualizar';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    console.error(e);
    mostrarMensagem('Erro ao carregar registro para edição.', 'erro');
  }
}

async function excluirRegistro(id) {
  if (!cliente) return;
  if (!confirm('Tem certeza que deseja excluir este registro? Esta ação não pode ser desfeita.')) return;

  try {
    const { error } = await cliente.from('kmdiario').delete().eq('id', id);
    if (error) throw error;
    mostrarMensagem('Registro excluído.', 'sucesso');
    carregarLista();
  } catch (e) {
    console.error(e);
    mostrarMensagem('Erro ao excluir: ' + e.message, 'erro');
  }
}

document.getElementById('btnImprimir').addEventListener('click', () => window.print());
form.addEventListener('submit', salvarRegistro);

if (cliente && motorista) carregarLista();




  async function carregarEImprimirRelatorio(mes, ano) {
      try {
          // 1. Define o intervalo de busca (Formato ISO)
          const primeiroDia = `${ano}-${String(mes).padStart(2, '0')}-01`;
          const ultimoDia = `${ano}-${String(mes).padStart(2, '0')}-${new Date(ano, mes, 0).getDate()}`;

          // 2. Consulta no Supabase trazendo a tabela relacionada
          const { data: registrosBanco, error } = await supabase
              .from('kmdiario') 
              .select(`
                  *,
                  motoristas (
                      nome,
                      turno
                  )
              `) 
              .gte('data', primeiroDia)
              .lte('data', ultimoDia);

          if (error) throw error;

          // 3. Alimenta o período do cabeçalho
          document.getElementById('print-periodo').innerText = `${String(mes).padStart(2, '0')}/${ano}`;
          
          // CORREÇÃO DOS CAMPOS DO MOTORISTA (Acessando o objeto aninhado corretamente)
          // O uso do '?' evita que o código trave caso registrosBanco esteja vazio
          const primeiroRegistro = registrosBanco && registrosBanco.length > 0 ? registrosBanco[0] : null;
          
          document.getElementById('print-motorista').innerText = primeiroRegistro?.motoristas?.nome || "Não Informado";
          document.getElementById('print-turno').innerText = primeiroRegistro?.motoristas?.turno || "Não Informado";

          // 4. Montagem da tabela completa incluindo dias vazios
          const totalDiasMes = new Date(ano, mes, 0).getDate();
          const tbody = document.getElementById('print-table-body');
          tbody.innerHTML = ''; 

          for (let dia = 1; dia <= totalDiasMes; dia++) {
              const diaStr = String(dia).padStart(2, '0');
              const mesStr = String(mes).padStart(2, '0');
              
              const dataISO = `${ano}-${mesStr}-${diaStr}`;
              const dataPTBR = `${diaStr}/${mesStr}/${ano}`;

              // Procura o registro comparando os dois formatos possíveis de banco
              const registroDoDia = registrosBanco.find(item => item.data === dataISO || item.data === dataPTBR) || {};

              // Realiza o cálculo matemático do KM total se ele não vier pronto do banco
              let kmTotalExibir = registroDoDia.km_total;
              if (!kmTotalExibir && registroDoDia.km_final && registroDoDia.km_inicio) {
                  kmTotalExibir = registroDoDia.km_final - registroDoDia.km_inicio;
              }

              const tr = document.createElement('tr');
              tr.innerHTML = `
                  <td>${diaStr}/${mesStr}</td>
                  <td>${registroDoDia.km_inicio ?? ''}</td>
                  <td>${registroDoDia.km_final ?? ''}</td>
                  <td>${kmTotalExibir ?? ''}</td>
                  <td>${registroDoDia.placa ?? ''}</td>
                  <td>${registroDoDia.rota ?? ''}</td>
                  <td>${registroDoDia.observacoes ?? ''}</td>
              `;
              tbody.appendChild(tr);
          }

          // 5. Aciona a janela de impressão
          window.print();

      } catch (err) {
          console.error('Erro ao buscar dados do Supabase:', err);
          alert('Não foi possível carregar os dados para a impressão.');
      }
  }

    // Vincula a função ao clique do seu botão Imprimir atual
    document.querySelector('.btn-imprimir').addEventListener('click', () => {
        // Exemplo de chamada: Passe o mês atual, ano atual e a lista de registros guardados
        const mesAtual = new Date().getMonth() + 1;
        const anoAtual = new Date().getFullYear();
        const seusDadosDoBanco = []; // Substitua pela sua variável que carrega os dados
        
        prepararEImprimir(mesAtual, anoAtual, seusDadosDoBanco);
    });




</script>

</body>
</html>
