<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de KM Diário</title>
    <script src="https://jsdelivr.net"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Controle de KM Diário</h1>
    
    

    <!-- Formulário de Cadastro / Edição -->
    <form id="formKm">
        <input type="hidden" id="idRegistro">
        
        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="data" required>
        </div>
        <div class="form-group">
            <label>Placa do Veículo:</label>
            <input type="text" id="placa" placeholder="ABC-1234" required>
        </div>
        <div class="form-group">
            <label>KM Inicial:</label>
            <input type="number" id="kmInicio" min="0" required>
        </div>
        <div class="form-group">
            <label>KM Final:</label>
            <input type="number" id="kmFinal" min="0" required>
        </div>
        <div class="form-group">
            <label>KM Total (Automático):</label>
            <input type="number" id="kmTotal" readonly placeholder="0">
        </div>
        <div class="form-group">
            <label>Rota:</label>
            <input type="text" id="rota" placeholder="Ex: Centro x Zona Sul" required>
        </div>
        <div class="form-group">
            <label>Observações:</label>
            <textarea id="obs" placeholder="Alguma ocorrência?"></textarea>
        </div>
        
        <button type="submit" id="btnSalvar">Salvar Registro</button>
        <button type="button" id="btnCancelar" onclick="cancelarEdicao()" style="background: #6c757d; color: white; width: 100%; margin-top: 5px;">Cancelar Edição</button>
        <a href="menu.html" class="btn-voltar">Voltar ao Menu</a>
    </form>

    <!-- Tabela de Exibição -->
    <!-- Procure a seção da tabela e adicione o botão logo antes dela -->
    <h2>Registros Salvos</h2>

    <!-- NOVO BOTÃO DE IMPRIMIR -->
    



    <!-- Mantenha seu formulário e sua tabela original aqui... -->

    <!-- NOVO BOTÃO DE IMPRESSÃO (Substitua o antigo por este) -->
    <button type="button" id="btnAbrirModal" onclick="abrirModalImpressao()">🖨️ Preparar Impressão Mensal</button>

    <!-- ESTRUTURA DO MODAL (Insira logo acima da tag <script>) -->
    <div id="modalImpressao" class="modal-container">
        <div class="modal-conteudo">
            <h3>Dados do Cabeçalho de Impressão</h3>
            
            <div class="modal-campo">
                <label>Nome do Motorista:</label>
                <input type="text" id="modalMotorista" placeholder="Ex: João da Silva">
            </div>
            
            <div class="modal-campo">
                <label>Turno:</label>
                <input type="text" id="modalTurno" placeholder="Ex: Diurno / Noite">
            </div>
            
            <div class="modal-campo">
                <label>Mês/Ano do Relatório:</label>
                <input type="month" id="modalMesAno">
            </div>
            
            <div class="modal-botoes">
                <button type="button" class="btn-cancelar-modal" onclick="fecharModalImpressao()">Voltar</button>
                <button type="button" class="btn-confirmar-modal" onclick="confirmarEImprimir()">Confirmar e Imprimir</button>
            </div>
        </div>
    </div>




    <div style="overflow-x: auto; margin-top: 15px;">
        <table>               
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Placa</th>
                    <th>KM Inicial</th>
                    <th>KM Final</th>
                    <th>KM Total</th>
                    <th>Rota</th>
                    <th>Observações</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <!-- Linhas inseridas via JavaScript -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
