<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Abastecimento</title>
    <script src="https://jsdelivr.net"></script>

    <link rel="stylesheet" href="style.css"> <!-- Reutiliza o estilo responsivo existente -->
    <style>
        /* Adições específicas para a área de fotos */
        .preview-container {
            display: grid;
            grid-template-columns: repeat(2, 100px);
            gap: 10px;
            margin-top: 10px;
        }
        .preview-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .btn-voltar {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Registrar Abastecimento</h1>
    
    <form id="formAbastecimento">
        <div class="form-group">
            <label>Motorista:</label>
            <input type="text" id="motorista" placeholder="Nome do Motorista" required>
        </div>
        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="data" required>
        </div>
        <div class="form-group">
            <label>Placa:</label>
            <input type="text" id="placa" placeholder="ABC-1234" required>
        </div>
        <div class="form-group">
            <label>Carro (Número):</label>
            <input type="number" id="carro" placeholder="Ex: 123" required>
        </div>
        <div class="form-group">
            <label>KM Atual:</label>
            <input type="number" id="kmAtual" min="0" required>
        </div>
        <div class="form-group">
            <label>Litros Diesel:</label>
            <input type="number" id="litrosDiesel" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div class="form-group">
            <label>Litros ARLA:</label>
            <input type="number" id="litrosArla" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Anexar Imagens (Máx: 4 fotos):</label>
            <!-- O atributo 'capture' abre a câmera direto no celular -->
            <input type="file" id="fotos" accept="image/*" multiple capture="environment">
            <div id="previewFotos" class="preview-container"></div>
        </div>
        
        <button type="submit" id="btnSalvar">Salvar Abastecimento</button>
        <a href="index.html" class="btn-voltar">Voltar ao Menu</a>
    </form>

    <script>
        const form = document.getElementById('formAbastecimento');
        const inputFotos = document.getElementById('fotos');
        const previewFotos = document.getElementById('previewFotos');
        let fotosBase64 = []; // Guarda as fotos convertidas em texto para salvar no banco

        // Controla e valida o limite de 4 fotos + gera a miniatura (preview)
        inputFotos.addEventListener('change', (e) => {
            previewFotos.innerHTML = '';
            fotosBase64 = [];
            const arquivos = Array.from(e.target.files);

            if (arquivos.length > 4) {
                alert("Você só pode selecionar no máximo 4 fotos!");
                inputFotos.value = ''; // Limpa a seleção
                return;
            }

            arquivos.forEach(arquivo => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // Adiciona o preview na tela
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.classList.add('preview-img');
                    previewFotos.appendChild(img);
                    
                    // Salva a string Base64 para enviar ao backend
                    fotosBase64.push(event.target.result);
                };
                reader.readAsDataURL(arquivo);
            });
        });

        // Envia os dados para a API do Back-End
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                motorista: document.getElementById('motorista').value,
                data: document.getElementById('data').value,
                placa: document.getElementById('placa').value.toUpperCase(),
                carro: document.getElementById('carro').value,
                km_atual: parseFloat(document.getElementById('kmAtual').value),
                litros_diesel: parseFloat(document.getElementById('litrosDiesel').value),
                litros_arla: parseFloat(document.getElementById('litrosArla').value) || 0,
                fotos: JSON.stringify(fotosBase64) // Transforma o array de imagens em texto
            };

            try {
                const res = await fetch('http://localhost:3000/abastecimento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    alert('Abastecimento registrado com sucesso!');
                    form.reset();
                    previewFotos.innerHTML = '';
                    fotosBase64 = [];
                } else {
                    alert('Erro ao salvar no banco de dados.');
                }
            } catch (erro) {
                console.error(erro);
                alert('Erro de conexão com o servidor.');
            }
        });
    </script>
</body>
</html>
